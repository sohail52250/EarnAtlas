<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Certificates</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
My Certificates
</h1>


<h2>
میرے سرٹیفکیٹس
</h2>



<div id="certificates">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



const {data}=await supabase

.from("certificates")

.select("*")

.eq("user_id",user.id);



let html="";



data?.forEach(c=>{


html+=`

<div class="card">


<h3>
${c.course_name}
</h3>


<p>
Certificate ID:
${c.certificate_id}
</p>


<p>
${c.issued_date}
</p>


<a href="../verify/?id=${c.certificate_id}">

Verify Certificate

</a>


</div>

`;



});



document.getElementById("certificates")

.innerHTML=

html || "No certificates yet";


}


load();


</script>


</body>

</html>
