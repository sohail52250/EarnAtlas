<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Marketplace</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
EarnAtlas Marketplace
</h1>


<h2>
ڈیجیٹل مارکیٹ پلیس
</h2>



<div id="items">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data}=await supabase

.from("marketplace_items")

.select("*")

.order("created_at",

{ascending:false});



let html="";


data?.forEach(item=>{


html+=`

<div class="card">

<h3>

${item.title}

</h3>


<p>

${item.description}

</p>


<p>

Price:
${item.price}

</p>


<p>

${item.type}

</p>


</div>

`;



});


document.getElementById("items").innerHTML=html;


}



load();


</script>


</body>

</html>
