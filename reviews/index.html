<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Reviews</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Reviews & Ratings
</h1>


<h2>
ریٹنگ اور جائزے
</h2>



<div class="card">


<select id="rating">

<option>5</option>

<option>4</option>

<option>3</option>

<option>2</option>

<option>1</option>

</select>



<textarea id="comment"

placeholder="Write your review">

</textarea>



<button onclick="submitReview()">

Submit Review

</button>


</div>



<div id="list">

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function loadReviews(){


const {data}=await supabase

.from("reviews")

.select("*")

.order("created_at",

{ascending:false});



let html="";


data?.forEach(r=>{


html+=`

<div class="card">

<h3>
${"⭐".repeat(r.rating)}
</h3>

<p>
${r.comment}
</p>

</div>

`;



});


document.getElementById("list")

.innerHTML=html;


}



window.submitReview=async function(){


const {data:{user}}=

await supabase.auth.getUser();



await supabase

.from("reviews")

.insert({

user_id:user.id,

item_type:"course",

item_id:1,

rating:Number(rating.value),

comment:comment.value

});


loadReviews();


}



loadReviews();


</script>


</body>

</html>
