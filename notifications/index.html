<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Notifications</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
</head>


<body>


<h1>
Notifications
</h1>


<h2>
اطلاعات اور اعلانات
</h2>



<div id="notifications">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



const {data}=await supabase

.from("notifications")

.select("*")

.eq("user_id",user.id)

.order("created_at",

{ascending:false});



let html="";


data?.forEach(n=>{


html+=`

<div class="card">

<h3>
${n.title}
</h3>

<p>
${n.message}
</p>

<small>
${n.created_at}
</small>

</div>

`;



});



document.getElementById("notifications")

.innerHTML=

html || "No notifications";


}



load();


</script>


</body>

</html>
