<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Affiliate</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
EarnAtlas Affiliate Program
</h1>


<h2>
کمیشن پروگرام
</h2>



<div class="card">


<p id="code">

Creating code...

</p>


<p>

Share your EarnAtlas link and earn rewards.

</p>


</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



let {data}=await supabase

.from("affiliates")

.select("*")

.eq("user_id",user.id)

.single();



if(!data){


let code=

"EA-"+Math.random()

.toString(36)

.substring(2,8)

.toUpperCase();



await supabase

.from("affiliates")

.insert({

user_id:user.id,

affiliate_code:code

});


data={affiliate_code:code};


}



document.getElementById("code")

.innerText=

"Affiliate Code: "

+data.affiliate_code;


}


load();


</script>


</body>

</html>
