<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Community</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
EarnAtlas Community
</h1>


<h2>
سٹوڈنٹ کمیونٹی
</h2>



<div class="card">


<input id="title"

placeholder="Discussion title">



<textarea id="content"

placeholder="Ask a question or share knowledge">

</textarea>



<button onclick="post()">

Create Post

</button>


</div>



<div id="feed">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data}=await supabase

.from("community_posts")

.select("*")

.order("created_at",

{ascending:false});



let html="";



data?.forEach(p=>{


html+=`

<div class="card">

<h3>

${p.title}

</h3>


<p>

${p.content}

</p>


</div>

`;



});



document.getElementById("feed")

.innerHTML=html;


}



window.post=async function(){


const {data:{user}}=

await supabase.auth.getUser();



await supabase

.from("community_posts")

.insert({

user_id:user.id,

title:title.value,

content:content.value

});


load();


}



load();


</script>


</body>

</html>
