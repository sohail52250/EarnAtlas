<!DOCTYPE html>

<html>

<head>

<title>Advertiser Dashboard</title>

<link rel="stylesheet" href="../../css/style.css">

</head>


<body>


<h1>
My Advertisements
</h1>


<h2>
میری تشہیری پوسٹس
</h2>


<div id="ads">

Loading...

</div>



<script type="module">


import {supabase}

from "../../supabase/js/client.js";



async function load(){


const {data:{user}}=

await supabase.auth.getUser();



const {data}=await supabase

.from("advertisements")

.select("*")

.eq("user_id",user.id);



document.getElementById("ads").innerHTML=

JSON.stringify(data,null,2);


}



load();


</script>


</body>

</html>
