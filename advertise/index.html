<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Advertise With EarnAtlas</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
</head>


<body>

<div class="auth-box">

<h1>
Advertise With EarnAtlas
</h1>

<h2>
EarnAtlas پر اشتہار دیں
</h2>


<p>
Reach online learners and digital entrepreneurs.
اپنے کاروبار کو آن لائن سیکھنے والوں تک پہنچائیں۔
</p>


<input id="business" placeholder="Business Name / کاروبار کا نام">


<input id="contact" placeholder="Contact Person / رابطہ شخص">


<input id="email" placeholder="Email / ای میل">


<input id="phone" placeholder="Phone / فون">


<input id="website" placeholder="Website">


<input id="category" placeholder="Business Category">


<textarea id="description"
placeholder="Describe your business / اپنے کاروبار کی تفصیل"></textarea>


<button onclick="submitAd()">
Submit Advertisement
</button>


<p id="msg"></p>


</div>


<script type="module">

import {supabase} from "../supabase/js/client.js";


window.submitAd = async function(){


const ad={

business_name:
document.getElementById("business").value,

contact_name:
document.getElementById("contact").value,

email:
document.getElementById("email").value,

phone:
document.getElementById("phone").value,

website:
document.getElementById("website").value,

category:
document.getElementById("category").value,

description:
document.getElementById("description").value

};


const {error}=await supabase
.from("advertisements")
.insert(ad);


if(error){

document.getElementById("msg").innerText=
error.message;

return;

}


document.getElementById("msg").innerText=
"Submitted successfully. Admin approval required.";

}

</script>


<script src='../../ads-component.html'></script></body>

</html>
