<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Messages</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Messages
</h1>


<h2>
پیغامات
</h2>



<div class="card">


<input id="receiver"

placeholder="Receiver User ID">



<textarea id="text"

placeholder="Write message">

</textarea>



<button onclick="sendMessage()">

Send

</button>


</div>



<div id="inbox">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function loadMessages(){


const {data:{user}}=

await supabase.auth.getUser();



const {data}=await supabase

.from("messages")

.select("*")

.or(

`sender_id.eq.${user.id},receiver_id.eq.${user.id}`

)

.order("created_at",

{ascending:false});



let html="";



data?.forEach(m=>{


html+=`

<div class="card">

<p>

${m.message}

</p>

</div>

`;



});


document.getElementById("inbox")

.innerHTML=

html || "No messages";


}



window.sendMessage=async function(){


const {data:{user}}=

await supabase.auth.getUser();



await supabase

.from("messages")

.insert({

sender_id:user.id,

receiver_id:receiver.value,

message:text.value

});



loadMessages();


}



loadMessages();


</script>


</body>

</html>
