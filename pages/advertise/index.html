<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Advertise With EarnAtlas</title>

<link rel="stylesheet" href="../../css/style.css">

</head>


<body>

<div id="language-area"></div>

<script>

fetch('/components/language.html')
.then(r=>r.text())
.then(t=>document.getElementById('language-area').innerHTML=t)

</script>



<h1>
Advertise With Us
</h1>

<p>
Grow your business with EarnAtlas visitors.
</p>


<div class="auth-box">


<input id="company" placeholder="Company Name">


<input id="website" placeholder="Website">


<input id="email" placeholder="Business Email">


<input id="phone" placeholder="Contact Phone">


<input id="category" placeholder="Business Category">


<textarea id="details" placeholder="Tell us about your business"></textarea>


<button onclick="submitAd()">
Submit Advertisement
</button>


<p id="result"></p>


</div>



<script type="module">

import {supabase} from "../../supabase/js/client.js";


window.submitAd = async function(){


const ad={

company_name:
document.getElementById("company").value,

website:
document.getElementById("website").value,

email:
document.getElementById("email").value,

phone:
document.getElementById("phone").value,

category:
document.getElementById("category").value,

details:
document.getElementById("details").value,


status:"pending"

};



const {error}=await supabase
.from("advertisements")
.insert(ad);



if(error){

document.getElementById("result").innerText=
error.message;

}

else{

document.getElementById("result").innerText=
"Advertisement submitted. Waiting for approval.";

}



}


</script>


</body>

</html>
