<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EarnAtlas Admin Ads</title>

<link rel="stylesheet" href="../../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
</head>


<body>


<h1>
EarnAtlas Advertisement Admin
</h1>

<h2>
اشتہارات کا انتظام
</h2>


<div id="ads">
Loading...
</div>



<script type="module">

import {supabase} from "../../supabase/js/client.js";


async function checkAdmin(){


const {data:{user}} =
await supabase.auth.getUser();


if(!user){

location.href="../auth/login.html";

return;

}



const {data:profile}=await supabase

.from("profiles")

.select("role")

.eq("id",user.id)

.single();



if(!profile || profile.role!=="admin"){

document.body.innerHTML=
"<h1>Access Denied</h1>";

return;

}


loadAds();

}



async function loadAds(){


const {data,error}=await supabase

.from("advertisements")

.select("*")

.order("created_at",{ascending:false});



if(error){

document.getElementById("ads").innerHTML=
error.message;

return;

}



let html="";


data.forEach(ad=>{


html+=

<div class="card">

<h3></h3>

<p></p>

<p>

</p>

<p>
Status: 
</p>


<button onclick="updateAd(,'approved')">
Approve
</button>


<button onclick="updateAd(,'rejected')">
Reject
</button>


</div>

;


});


document.getElementById("ads").innerHTML=html;


}



window.updateAd=async function(id,status){


await supabase

.from("advertisements")

.update({status:status})

.eq("id",id);



loadAds();


}



checkAdmin();


</script>


<script src='../../ads-component.html'></script></body>

</html>
