<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Advertisement Approval</title>

<link rel="stylesheet" href="../../css/style.css">

</head>


<body>


<h1>
Advertisement Approval Panel
</h1>


<h2>
اشتہارات کی منظوری
</h2>



<div id="ads">

Loading...

</div>



<script type="module">


import {supabase}

from "../../supabase/js/client.js";



async function checkAdmin(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../auth/login.html";

return;

}



const {data:profile}=await supabase

.from("profiles")

.select("role")

.eq("id",user.id)

.single();



if(!profile || profile.role!=="admin"){

document.body.innerHTML=

"<h1>Access Denied</h1>";

return;

}


loadAds();


}



async function loadAds(){


const {data}=await supabase

.from("advertisements")

.select("*")

.eq("status","pending");



let html="";



data.forEach(ad=>{


html+=`

<div class="card">


<h3>
${ad.business_name}
</h3>


<p>
${ad.category}
</p>


<p>
${ad.description}
</p>


<p>
${ad.email}
</p>



<button onclick="updateAd(${ad.id},'approved')">

Approve

</button>



<button onclick="updateAd(${ad.id},'rejected')">

Reject

</button>


</div>

`;



});



document.getElementById("ads").innerHTML=html;


}



window.updateAd=async function(id,status){


await supabase

.from("advertisements")

.update({

status:status

})

.eq("id",id);



location.reload();


}



checkAdmin();


</script>


</body>

</html>
