<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Recommendations</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Smart Learning Recommendations
</h1>


<h2>
ذہین سیکھنے کی تجاویز
</h2>



<div id="recommendations">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



const {data}=await supabase

.from("recommendations")

.select("*")

.eq("user_id",user.id);



let html="";



data?.forEach(item=>{


html+=`

<div class="card">

<h3>

${item.skill}

</h3>

<p>

${item.reason}

</p>

</div>

`;



});



document.getElementById("recommendations")

.innerHTML=

html || "Complete lessons to receive recommendations";


}



load();


</script>


</body>

</html>
