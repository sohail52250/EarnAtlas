<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lesson Quiz</title>

<link rel="stylesheet" href="../../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="/css/navigation.css">
</head>


<body>


<h1>
Lesson Quiz
</h1>


<div id="quiz">

Loading...

</div>


<script type="module">


import {supabase}

from "../../supabase/js/client.js";


const id =
new URLSearchParams(location.search).get("id");



async function load(){


const {data:{user}}=

await supabase.auth.getUser();


if(!user){

location.href="../../pages/auth/login.html";

return;

}



document.getElementById("quiz").innerHTML=

<h2>
Complete this lesson quiz
</h2>


<p>
Did you understand this lesson?
</p>


<button onclick="finishQuiz(100)">
Pass Quiz
</button>


<button onclick="finishQuiz(40)">
Retry Learning
</button>

;



window.finishQuiz=async function(score){


let passed=score>=70;



await supabase

.from("quiz_results")

.insert({

user_id:user.id,

lesson_id:id,

score:score,

passed:passed

});



if(passed){


alert("Lesson completed. Next lesson unlocked.");


location.href="dashboard.html";


}

else{


alert("Please study again and retry.");

}


}



}



load();


</script>


</body>

</html>
