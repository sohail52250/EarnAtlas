<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EarnAtlas Lesson</title>

<link rel="stylesheet" href="../../css/style.css">

</head>


<body>

<h1 id="title"></h1>

<h2 id="urdu"></h2>


<div id="content"></div>


<hr>


<h2>Quiz / سوال</h2>


<div id="quiz"></div>


<button id="submit">
Submit Answer
</button>


<h3 id="result"></h3>



<script type="module">

import {supabase} from "../../supabase/js/client.js";


const params=new URLSearchParams(location.search);

const lessonId=params.get("id");

let user;



async function load(){


const auth=await supabase.auth.getUser();

user=auth.data.user;


if(!user){

location.href="../../pages/auth/login.html";

return;

}



const {data:lesson}=await supabase
.from("lessons")
.select("*")
.eq("id",lessonId)
.single();



document.getElementById("title").innerText=
lesson.title_en;


document.getElementById("urdu").innerText=
lesson.title_ur;


document.getElementById("content").innerHTML=

`
<p>${lesson.content_en}</p>

<p>${lesson.content_ur}</p>
`;



document.getElementById("quiz").innerHTML=

`

<p>What did you learn?</p>

<label>

<input type="radio" name="q" value="yes">

I understand / میں سمجھ گیا

</label>

<br>

<label>

<input type="radio" name="q" value="no">

I need revision / دوبارہ پڑھنا ہے

</label>

`;



document.getElementById("submit").onclick=()=>completeLesson();


}



async function completeLesson(){


let answer=document.querySelector(
'input[name="q"]:checked'
);



if(!answer){

alert("Choose answer");

return;

}



if(answer.value==="yes"){



await supabase
.from("user_progress")
.upsert({

user_id:user.id,

lesson_id:Number(lessonId),

completed:true,

score:100

});



document.getElementById("result").innerHTML=

"✅ Completed! Next lesson unlocked.<br>سبق مکمل ہوگیا";


}

else{


document.getElementById("result").innerHTML=

"🔁 Please relearn this lesson.<br>براہ کرم سبق دوبارہ پڑھیں";


}



}



load();


</script>


</body>

</html>
