<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
EarnAtlas Lesson
</title>


<link rel="stylesheet" href="../../css/style.css">


</head>


<body>


<h1 id="title">
Loading...
</h1>


<button onclick="english()">
English
</button>


<button onclick="urdu()">
اردو
</button>


<div id="content"></div>


<button id="complete">
Complete Lesson
</button>



<script type="module">


import {supabase}
from "../../supabase/js/client.js";



let currentLanguage="en";


let lesson;



async function loadLesson(){


const id =
new URLSearchParams(location.search)
.get("id") || 1;



let {data,error}=await supabase

.from("lessons")

.select("*")

.eq("id",id)

.single();



if(error){

document.getElementById("content").innerHTML =
"Lesson not found";

return;

}



lesson=data;


showLesson();


}



function showLesson(){


if(currentLanguage==="en"){


document.getElementById("title").innerText =
lesson.title_en;


document.getElementById("content").innerText =
lesson.content_en;


}

else{


document.getElementById("title").innerText =
lesson.title_ur;


document.getElementById("content").innerText =
lesson.content_ur;


}


}



window.english=function(){

currentLanguage="en";

showLesson();

}



window.urdu=function(){

currentLanguage="ur";

showLesson();

}



document
.getElementById("complete")
.onclick=async function(){


const user =
await supabase.auth.getUser();



if(!user.data.user){

alert("Please login first");

return;

}



await supabase

.from("user_progress")

.insert({

user_id:user.data.user.id,

lesson_id:lesson.id,

completed:true,

score:100

});



alert("Lesson completed");


};



loadLesson();


</script>


</body>

</html>
