<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EarnAtlas Payments</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
EarnAtlas Subscription
</h1>


<h2>
سبسکرپشن اور ادائیگی
</h2>



<div class="card">


<h2>
Premium Membership
</h2>


<p>
Unlock advanced courses and certificates.
</p>


<p>
ایڈوانس کورسز اور سرٹیفکیٹس حاصل کریں۔
</p>


<button onclick="createOrder()">

Start Upgrade

</button>


</div>



<div id="message">

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



window.createOrder=async function(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



const {error}=await supabase

.from("payment_orders")

.insert({

user_id:user.id,

plan:"premium",

amount:10,

currency:"USD"

});



if(error){

document.getElementById("message").innerText=

error.message;

return;

}



document.getElementById("message").innerText=

"Payment request created";



}



</script>


</body>

</html>
