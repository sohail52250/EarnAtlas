<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Audit Center</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Admin Audit Center
</h1>


<h2>
سیکیورٹی لاگز
</h2>



<div id="logs">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function load(){


const {data}=await supabase

.from("audit_logs")

.select("*")

.order("created_at",

{ascending:false});



let html="";



data?.forEach(log=>{


html+=`

<div class="card">

<h3>

${log.action}

</h3>


<p>

${log.target}

</p>


<p>

${log.details || ""}

</p>


</div>

`;



});



document.getElementById("logs")

.innerHTML=

html || "No audit records";


}



load();


</script>


</body>

</html>
