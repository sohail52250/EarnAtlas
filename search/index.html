<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Search</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Search EarnAtlas
</h1>


<h2>
تلاش کریں
</h2>



<input id="query"

placeholder="Search courses, skills, services">



<button onclick="search()">

Search

</button>



<div id="results">

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



window.search=async function(){


const q=

document.getElementById("query").value;



const lessons=

await supabase

.from("lessons")

.select("*")

.ilike("title_en","%"+q+"%");



const products=

await supabase

.from("marketplace_items")

.select("*")

.ilike("title","%"+q+"%");



let html="";



lessons.data?.forEach(item=>{


html+=`

<div class="card">

<h3>
Course:
${item.title_en}

</h3>

</div>

`;

});



products.data?.forEach(item=>{


html+=`

<div class="card">

<h3>
Service:
${item.title}

</h3>

<p>
${item.description}
</p>

</div>

`;

});



document.getElementById("results")

.innerHTML=

html || "No results";


}


</script>


</body>

</html>
