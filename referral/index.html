<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Referral</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
EarnAtlas Referral Rewards
</h1>


<h2>
دوستوں کو بلائیں اور انعام حاصل کریں
</h2>



<div class="card">


<p id="code">

Loading...

</p>


<p>

Share your referral code with friends.

</p>


<p>

اپنا کوڈ دوستوں کے ساتھ شیئر کریں۔

</p>


</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function loadReferral(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



let {data}=await supabase

.from("referrals")

.select("*")

.eq("user_id",user.id)

.single();



if(!data){


let code=

"EA"+Math.random()

.toString(36)

.substring(2,8)

.toUpperCase();



await supabase

.from("referrals")

.insert({

user_id:user.id,

referral_code:code

});



data={referral_code:code};


}



document.getElementById("code")

.innerText=

"Your Referral Code: "

+data.referral_code;



}



loadReferral();


</script>


</body>

</html>
