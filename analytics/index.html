<div id="report">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function loadReport(){


const {data:{user}}=

await supabase.auth.getUser();



if(!user){

location.href="../pages/auth/login.html";

return;

}



const {data:profile}=await supabase

.from("profiles")

.select("role")

.eq("id",user.id)

.single();



if(!profile || profile.role!=="admin"){

document.body.innerHTML=

"<h1>Access Denied</h1>";

return;

}



const {data}=await supabase

.from("analytics_events")

.select("*");



let visits=data.filter(

x=>x.event_type==="visit"

).length;



let ads=data.filter(

x=>x.event_type==="ad_view"

).length;



let lessons=data.filter(

x=>x.event_type==="lesson_complete"

).length;



document.getElementById("report").innerHTML=



<div class="card">

<h3>
Page Visits: 
</h3>


<h3>
Advertisement Views: <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6687674736927382"
crossorigin="anonymous"></script>
</h3>


<h3>
Completed Lessons: 
</h3>


</div>

;



}



loadReport();


</script>
