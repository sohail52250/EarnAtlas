<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Analytics</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
</head>


<body>


<h1>
EarnAtlas Analytics Dashboard
</h1>


<h2>
اعداد و شمار
</h2>



<div id="stats">

Loading...

</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



async function loadStats(){


const users=

await supabase

.from("profiles")

.select("*");



const lessons=

await supabase

.from("user_progress")

.select("*");



const products=

await supabase

.from("marketplace_items")

.select("*");



document.getElementById("stats")

.innerHTML=

`

<div class="card">

<h3>
Total Users
</h3>

<p>
${users.data?.length || 0}
</p>

</div>


<div class="card">

<h3>
Learning Records
</h3>

<p>
${lessons.data?.length || 0}
</p>

</div>


<div class="card">

<h3>
Marketplace Items
</h3>

<p>
${products.data?.length || 0}
</p>

</div>

`;

}


loadStats();


</script>


</body>

</html>
