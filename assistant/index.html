<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>EarnAtlas AI Assistant</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
</head>


<body>


<h1>
EarnAtlas AI Learning Assistant
</h1>


<h2>
AI سیکھنے کا معاون
</h2>



<div class="card">


<textarea id="question"

placeholder="Ask about skills, freelancing or online earning">

</textarea>



<button onclick="askAI()">

Ask AI

</button>


<div id="answer">

</div>


</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



window.askAI=async function(){


const question=

document.getElementById("question").value;



let answer="";


if(question.toLowerCase().includes("skill")){

answer=

"Start with digital marketing, programming, design or AI tools.";

}

else if(question.toLowerCase().includes("freelance")){

answer=

"Create a profile, build samples and start with small projects.";

}

else{

answer=

"Learn consistently and improve your digital skills.";

}



document.getElementById("answer").innerText=

answer;



const {data:{user}}=

await supabase.auth.getUser();



if(user){


await supabase

.from("ai_messages")

.insert({

user_id:user.id,

question:question,

answer:answer

});


}


}



</script>


</body>

</html>
