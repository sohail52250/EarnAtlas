<!DOCTYPE html>

<html>

<head>

<title>EarnAtlas Creator Dashboard</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<h1>
Creator Dashboard
</h1>


<h2>
کورس کریئیٹر ڈیش بورڈ
</h2>



<div class="card">


<input id="title"

placeholder="Course Title">



<textarea id="description"

placeholder="Course Description">

</textarea>



<input id="price"

placeholder="Price">



<button onclick="publishCourse()">

Publish Course

</button>


</div>



<script type="module">


import {supabase}

from "../supabase/js/client.js";



window.publishCourse=async function(){


const {data:{user}}=

await supabase.auth.getUser();



const {data:creator}=await supabase

.from("creators")

.select("*")

.eq("user_id",user.id)

.single();



await supabase

.from("creator_courses")

.insert({

creator_id:creator.id,

title:title.value,

description:description.value,

price:price.value

});



alert("Course submitted");


}



</script>


</body>

</html>
